name = "influenceos"
main = "src/index.ts"
compatibility_date = "2024-12-19"

[env.production]
name = "influenceos-prod"
route = "influenceos.workers.dev"

[build]
command = "npm run build"
cwd = ".."
watch_paths = ["../src/**/*.ts"]

[env.production.build]
command = "npm run build"

# Assets for static files
[build.upload]
format = "service-worker"

# Analytics Engine binding
[[analytics_engine_datasets]]
binding = "ANALYTICS"

# KV Namespace for caching
[[kv_namespaces]]
binding = "CACHE"
id = "influenceos-cache"
preview_id = "influenceos-cache-preview"

# D1 Database binding (when created)
[[d1_databases]]
binding = "DB"
database_name = "influenceos-db"
database_id = "db-id-placeholder"

# Env variables
[env.production.env]
ENVIRONMENT = "production"
